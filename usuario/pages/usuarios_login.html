    <body>
    <header>
        <h1>Cadastro de Usuário</h1>
    </header>

    <main>
        <form id="formCadastro">
            <h2>cadastro/login</h2>
            
            <label>Nome:</label><br>
            <input type="text" class="form-control" id="nome" placeholder="Nome de Usuario" required><br><br>

            <label>Email:</label><br>
            <input type="email" class="form-control" id="email" placeholder="Email" required><br><br>

            <label>Senha:</label><br>
            <input type="password" class="form-control" id="senha" placeholder="Senha de Usuario" required><br><br>

            <button type="submit">Cadastrar</button>
        </form>

        <p id="mensagem"></p>
    </main>
